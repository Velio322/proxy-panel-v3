version: '3.8'

# ══════════════════════════════════════════════════════════════
# ProxPanel Docker Compose
# ══════════════════════════════════════════════════════════════
# Usage:
#   Development:  docker compose --profile dev up -d
#   Production:   docker compose --profile prod up -d --build
#   Infra only:   docker compose up -d postgres redis
#   Stop all:     docker compose --profile dev --profile prod down
# ══════════════════════════════════════════════════════════════

x-common-env: &common-env
  DATABASE_URL: postgresql://${POSTGRES_USER:-proxpanel}:${POSTGRES_PASSWORD:-proxpanel123}@postgres:5432/proxpanel?schema=public
  REDIS_URL: redis://redis:6379
  JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-not-for-production}
  JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
  API_URL: ${API_URL:-http://localhost:3000}
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
  NODE_RPC_SECRET: ${NODE_RPC_SECRET:-dev-node-rpc-secret}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key-32-chars!!}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
  TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS:-}
  CRYPTOPAY_TOKEN: ${CRYPTOPAY_TOKEN:-}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
  BACKUP_ENABLED: ${BACKUP_ENABLED:-false}
  PROMETHEUS_ENABLED: ${PROMETHEUS_ENABLED:-true}
  PROMETHEUS_PORT: 9090

services:
  # ═══════ Infrastructure (always available) ═══════

  postgres:
    image: postgres:16-alpine
    container_name: proxpanel-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: proxpanel
      POSTGRES_USER: ${POSTGRES_USER:-proxpanel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-proxpanel123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-proxpanel}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proxpanel

  redis:
    image: redis:7-alpine
    container_name: proxpanel-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proxpanel

  # ═══════ Development Profile ═══════
  # Runs server + client in dev mode (hot reload)
  # Usage: docker compose --profile dev up -d

  server-dev:
    profiles: ["dev"]
    build:
      context: ./server
      dockerfile: Dockerfile
      target: development
    container_name: proxpanel-server-dev
    restart: unless-stopped
    volumes:
      - ./server/src:/app/src
      - ./server/prisma:/app/prisma
    ports:
      - "127.0.0.1:${API_PORT:-3000}:3000"
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    environment:
      <<: *common-env
      API_PORT: 3000
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proxpanel

  client-dev:
    profiles: ["dev"]
    image: node:22-alpine
    container_name: proxpanel-client-dev
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5173}:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - server-dev
    networks:
      - proxpanel

  # ═══════ Production Profile ═══════
  # Builds and runs optimized containers
  # Usage: docker compose --profile prod up -d --build

  server-prod:
    profiles: ["prod"]
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: proxpanel-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:${API_PORT:-3000}:3000"
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    environment:
      <<: *common-env
      API_PORT: 3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - proxpanel

  client-prod:
    profiles: ["prod"]
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: proxpanel-client
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-80}:80"
    depends_on:
      - server-prod
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - proxpanel

  # ═══════ Monitoring (shared) ═══════

  prometheus:
    image: prom/prometheus:latest
    container_name: proxpanel-prometheus
    restart: unless-stopped
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_UI_PORT:-9091}:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - proxpanel

  grafana:
    image: grafana/grafana:latest
    container_name: proxpanel-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"
    networks:
      - proxpanel

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  proxpanel:
    driver: bridge
