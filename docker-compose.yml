version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: proxpanel-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: proxpanel
      POSTGRES_USER: ${POSTGRES_USER:-proxpanel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-proxpanel_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-proxpanel}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proxpanel

  redis:
    image: redis:7-alpine
    container_name: proxpanel-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proxpanel

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: proxpanel-server
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
      - "${PROMETHEUS_PORT:-9090}:9090"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-proxpanel}:${POSTGRES_PASSWORD:-proxpanel_secret}@postgres:5432/proxpanel?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-jwt-secret-key}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      API_PORT: 3000
      API_URL: ${API_URL:-http://localhost:3000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS:-}
      NODE_RPC_SECRET: ${NODE_RPC_SECRET:-change-this-node-secret}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-32-char-encryption-key-here}
      CRYPTOPAY_TOKEN: ${CRYPTOPAY_TOKEN:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      BACKUP_ENABLED: ${BACKUP_ENABLED:-false}
      BACKUP_TELEGRAM_TOKEN: ${BACKUP_TELEGRAM_TOKEN:-}
      BACKUP_TELEGRAM_CHAT_ID: ${BACKUP_TELEGRAM_CHAT_ID:-}
      PROMETHEUS_ENABLED: ${PROMETHEUS_ENABLED:-true}
      PROMETHEUS_PORT: 9090
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proxpanel

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: proxpanel-client
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - server
    networks:
      - proxpanel

  prometheus:
    image: prom/prometheus:latest
    container_name: proxpanel-prometheus
    restart: unless-stopped
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_UI_PORT:-9091}:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - proxpanel

  grafana:
    image: grafana/grafana:latest
    container_name: proxpanel-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    networks:
      - proxpanel

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  proxpanel:
    driver: bridge
