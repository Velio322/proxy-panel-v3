# ══════════════════════════════════════════════════════════════
# ProxPanel v3 — Production
# ══════════════════════════════════════════════════════════════

services:
  postgres:
    image: postgres:16-alpine
    container_name: proxpanel-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: proxpanel
      POSTGRES_USER: proxpanel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxpanel"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - proxpanel

  redis:
    image: redis:7-alpine
    container_name: proxpanel-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - proxpanel

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: proxpanel-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://proxpanel:${POSTGRES_PASSWORD}@postgres:5432/proxpanel?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      start_period: 90s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proxpanel

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: proxpanel-client
    restart: unless-stopped
    networks:
      - proxpanel

  caddy:
    image: caddy:2-alpine
    container_name: proxpanel-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      server:
        condition: service_healthy
      client:
        condition: service_started
    networks:
      - proxpanel

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  proxpanel:
    driver: bridge
